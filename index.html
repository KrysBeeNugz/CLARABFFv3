<script type="module">

// Prompt OpenRouter key in ensureApiKey()
async function ensureApiKey() {
    const key = localStorage.getItem('clara_gemini_key'); // keep same key for compatibility
    if (key) return key;
    return new Promise(resolve => {
        window._apiKeyResolve = resolve;
        const box = document.getElementById('chatMessages');
        if (!box) { resolve(null); return; }
        const div = document.createElement('div');
        div.id = 'apiKeyPromptInline';
        div.className = 'flex flex-col items-center gap-3 p-4 bg-gothpurple-50/60 rounded-2xl border border-gothpurple-300/40 text-center mx-2';
        div.innerHTML = `
            <p class="text-sm font-bold text-ashgray-100 font-serif">Clara needs an OpenRouter API key to think.</p>
            <p class="text-xs text-ashgray-200">Get a key at <a href="https://openrouter.ai/keys" target="_blank" class="text-neonpink-200 underline font-semibold">openrouter.ai/keys</a>.</p>
            <div class="flex gap-2 w-full max-w-sm">
                <input id="inlineApiKeyInput" type="password" placeholder="Paste OpenRouter key..." class="flex-grow p-3 text-xs rounded-xl border border-gothpurple-300/40 bg-gothblack-200 text-ashgray-100">
                <button onclick="window.submitInlineApiKey()" class="px-4 py-2 bg-neonpink-200 hover:bg-neonpink-300 text-white rounded-xl text-xs font-bold transition-all">Save</button>
            </div>
            <p class="text-[10px] text-ashgray-300">Stored only on your device. Never shared.</p>
        `;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    });
}
window.submitInlineApiKey = function() {
    const input = document.getElementById('inlineApiKeyInput');
    const key = input?.value?.trim();
    if (!key) return;
    localStorage.setItem('clara_gemini_key', key);
    document.getElementById('apiKeyPromptInline')?.remove();
    if (window._apiKeyResolve) { window._apiKeyResolve(key); window._apiKeyResolve = null; }
};

// Replace sendChatMessage function to use OpenRouter
let lastMessageTime = 0;
const MESSAGE_COOLDOWN_MS = 4000; // 4 seconds between messages
async function sendChatMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    const now = Date.now();
    const elapsed = now - lastMessageTime;
    if (elapsed < MESSAGE_COOLDOWN_MS) {
        const wait = Math.ceil((MESSAGE_COOLDOWN_MS - elapsed) / 1000);
        showToast(`Give me ${wait}s — processing last message...`);
        return;
    }
    input.value = '';
    const apiKey = await ensureApiKey();
    if (!apiKey) return;
    const sendBtn = document.getElementById('chatSendBtn');
    if (sendBtn) { sendBtn.disabled = true; sendBtn.classList.add('opacity-50'); }
    lastMessageTime = Date.now();
    state.chatHistory.push({ role: "user", parts: [{ text }] });
    renderSyncedChat();
    try {
        const trimmedHistory = state.chatHistory.slice(-10);
        const formattedMessages = [
            { role: "system", content: CLARA_SYSTEM_PROMPT },
            ...trimmedHistory.map(msg => ({
                role: msg.role === "model" ? "assistant" : "user",
                content: msg.parts[0].text,
            }))
        ];
        const model = "meta-llama/llama-3-8b-instruct:free"; // Or anthropic/claude-3-5-sonnet, etc.
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`,
            },
            body: JSON.stringify({
                model,
                messages: formattedMessages,
                temperature: 0.9,
                response_format: { type: "json_object" }
            }),
        });
        if (!response.ok) {
            const errText = await response.text();
            throw new Error(`API Error: ${response.status} - ${errText}`);
        }
        const data = await response.json();
        const rawContent = data.choices[0].message.content;
        let parsed = { reply: rawContent, actions: { tasks: [], events: [], therapyNotes: [], microSteps: [] } };
        try { parsed = JSON.parse(rawContent); } catch(e) { parsed.reply = rawContent; }
        state.chatHistory.push({ role: "model", parts: [{ text: parsed.reply }] });
        if (parsed.actions?.tasks?.length) {
            parsed.actions.tasks.forEach(t => state.tasks.push({ id: Date.now() + Math.random(), ...t, completed: false }));
        }
        if (parsed.actions?.events?.length) {
            parsed.actions.events.forEach(ev => state.events.push({ id: Date.now() + Math.random(), ...ev }));
        }
        if (parsed.actions?.therapyNotes?.length) {
            parsed.actions.therapyNotes.forEach(n => state.therapyNotes.push({ id: Date.now() + Math.random(), ...n, discussed: false }));
        }
        if (parsed.actions?.microSteps?.length) {
            parsed.actions.microSteps.forEach(ms => appendMicroStepsCard(ms.task, ms.steps));
        }
        persistAll();
        renderSyncedChat();
        renderTasks();
        renderTherapyNotes();
        renderHorizon();
    } catch(err) {
        console.error('Clara error:', err);
        state.chatHistory.push({ role: "model", parts: [{ text: `System hiccup: ${err.message}` }] });
        renderSyncedChat();
    } finally {
        if (sendBtn) { sendBtn.disabled = false; sendBtn.classList.remove('opacity-50'); }
    }
}
